# scraping-questions — NÃO usar o Postgres do projeto Dokploy "databases".
#
# O stack databases/ na VPS é só para o app Iluminys (sync, notebooks, jobs).
# O scraping mantém Postgres próprio (local ou profile local-db no compose do scraping).
#
# Dokploy iluminys-bakendai — exemplo (scraping no PC ou postgres do próprio stack):
#   DB_HOST=postgres          # serviço postgres DENTRO do compose scraping, não iluminys_db
#   PG_DB=tecconcursos        # ou iluminys só se for instância dedicada ao scraping
#   MINIO_ENDPOINT=...        # MinIO local do scraping, ou vazio se só filesystem
#
# Não adicionar rede iluminys_infra ao scraping para DB, salvo integração explícita futura.
