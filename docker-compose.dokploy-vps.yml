# Dokploy VPS — volume legado (iluminys-bakendai-tr3fuj_pg_data).
# Compose Path: docker-compose.dokploy-vps.yml
#
# No painel Dokploy use só DB_* + PG_* + Redis/MinIO (ver env.dokploy.example).
# O superuser tec do volume antigo fica só neste ficheiro (arranque do contentor).

name: iluminys-databases

services:
  iluminys_db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      # Volume criado com user tec — não confundir com PG_USER do painel (iluminys)
      POSTGRES_USER: tec
      POSTGRES_PASSWORD: Nosferatus123
      POSTGRES_DB: iluminys
    volumes:
      - iluminys_pg_data:/var/lib/postgresql
    ports:
      - "${DB_HOST:-127.0.0.1}:${DB_PORT:-15432}:5432"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U iluminys -d iluminys',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      iluminys_infra:
        aliases:
          - iluminys_db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy noeviction
    volumes:
      - iluminys_redis_data:/data
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      iluminys_infra:
        aliases:
          - iluminys_redis

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z-cpuv1
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://69.62.66.153:9001}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://69.62.66.153:9000}
    volumes:
      - iluminys_minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT_BIND:-0.0.0.0}:${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_BIND:-0.0.0.0}:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      iluminys_infra:
        aliases:
          - iluminys_minio

networks:
  iluminys_infra:
    name: iluminys_infra
    external: true

volumes:
  iluminys_pg_data:
    external: true
    name: iluminys-bakendai-tr3fuj_pg_data
  iluminys_redis_data:
    external: true
    name: iluminys-web-ijnbqc_redis_data
  iluminys_minio_data:
    external: true
    name: iluminys-web-ijnbqc_minio_data
