# Produção VPS — volumes externos (após migrate-vps).
# Uso contínuo: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  iluminys_db:
    environment:
      POSTGRES_USER: ${PG_USER:-tec}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Defina PG_PASSWORD}
      POSTGRES_DB: ${PG_DB:-iluminys}

  minio:
    ports:
      - "${MINIO_PORT_BIND:-127.0.0.1}:${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  iluminys_pg_data:
    external: true
    name: iluminys-bakendai-tr3fuj_pg_data
  iluminys_minio_data:
    external: true
    name: iluminys-web-ijnbqc_minio_data
  iluminys_redis_data:
    external: true
    name: iluminys-web-ijnbqc_redis_data
